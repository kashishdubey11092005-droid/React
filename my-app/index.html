<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-app</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
        color: #111;
      }

      .container {
        max-width: 480px;
        margin: 32px auto;
        padding: 16px;
      }

      h1 {
        background: #d1fae5;
        color: #065f46;
        padding: 12px;
        border-radius: 8px;
        font-size: 20px;
        margin: 0 0 12px;
      }

      input,
      button {
        display: block;
        width: 100%;
        margin-top: 8px;
        padding: 8px;
        box-sizing: border-box;
      }

      button {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
      }

      .muted {
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
